<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Venevo</title>

  <link rel="stylesheet" href="style.css"/>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>

<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <main class="app-container">

    <!-- HEADER -->

    <header class="top-header">

      <div>
        <span class="mini-title">PLATAFORMA DIGITAL</span>
        <h1>VENEVO</h1>
      </div>

      <button class="profile-btn">
        <i class="fa-solid fa-user"></i>
      </button>

    </header>

    <!-- HERO -->

    <section class="hero-card">

      <div class="hero-text">
        <span>NOW PLAYING</span>

        <h2 id="heroTitle">LA FAN FM</h2>

        <p id="heroDescription">
          Música, entretenimiento y radios online en un solo lugar.
        </p>
      </div>

      <div class="hero-image">

        <img
          id="heroCover"
          src="assets/lafan-cover.jpg"
          alt="cover"
        />

      </div>

      <div class="player-section">

        <button id="playBtn" class="play-btn">
          <i class="fa-solid fa-play"></i>
        </button>

        <div class="music-bars" id="musicBars">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

      </div>

      <audio
        id="radioPlayer"
        src="https://radio.megahostec.com/listen/radio_la_fan_fm/stream">
      </audio>

    </section>

    <!-- MODULOS -->

    <section class="modules">

      <div class="module-card">
        <i class="fa-solid fa-radio"></i>
        <span>Radios</span>
      </div>

      <div class="module-card">
        <i class="fa-solid fa-store"></i>
        <span>Negocios</span>
      </div>

      <div class="module-card">
        <i class="fa-solid fa-calendar-check"></i>
        <span>Reservas</span>
      </div>

      <div class="module-card">
        <i class="fa-solid fa-ticket"></i>
        <span>Eventos</span>
      </div>

    </section>

    <!-- RADIOS -->

    <section class="radios-section">

      <div class="section-title">
        <h3>Radios disponibles</h3>
      </div>

      <div class="radio-slider">

        <!-- LA FAN -->

        <div
          class="radio-card active-radio"
          data-name="LA FAN FM"
          data-theme="lafan"
          data-stream="https://radio.megahostec.com/listen/radio_la_fan_fm/stream"
          data-image="assets/lafan-cover.jpg"
          data-description="Música, entretenimiento y radios online en un solo lugar."
        >

          <img src="assets/lafan-cover.jpg" />

          <div class="radio-overlay">
            <h4>LA FAN FM</h4>
            <p>En vivo</p>
          </div>

        </div>

        <!-- CLIP FM -->

        <div
          class="radio-card"
          data-name="DOBLE CLIP FM"
          data-theme="clip"
          data-stream="https://radio.megahostec.com/listen/radio_clipfm/stream"
          data-image="assets/clipfm-cover.jpg"
          data-description="La radio con ritmo, energía y buena música."
        >

          <img src="assets/clipfm-cover.jpg" />

          <div class="radio-overlay">
            <h4>DOBLE CLIP FM</h4>
            <p>En vivo</p>
          </div>

        </div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
